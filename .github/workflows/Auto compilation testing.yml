name: 仅编译 R2C 专属依赖

on:
  workflow_dispatch: # 支持手动触发

env:
  TZ: Asia/Shanghai
  packages: Openwrt-Passwall/openwrt-passwall-packages

jobs:
  job_auto_compile:
    runs-on: ubuntu-22.04 # 【关键修正】锁定稳定版编译环境，避免 24.04 丢包问题
    name: 正在编译 R2C (aarch64_generic)
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: aarch64_generic
            url_sdk: https://downloads.openwrt.org/releases/24.10.5/targets/rockchip/armv8/openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            sdk_ver: "24.10"

    steps:
    - name: 检出代码
      uses: actions/checkout@main

    - name: 初始化编译环境 (全量稳定版)
      run: |
        sudo -E apt-get -qq update
        # 【关键修正】恢复官方原版全量编译工具，彻底杜绝缺少依赖包的报错
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: 下载 R2C 专用 SDK
      run: |
        wget ${{ matrix.url_sdk }}
        file_name=$(echo ${{matrix.url_sdk}} | awk -F/ '{print $NF}')
        mkdir sdk && tar --zstd -x -f $file_name -C ./sdk --strip-components=1

    - name: 更新并安装 Feeds
      run: |
        cd sdk
        cat > feeds.conf.default << EOF
        src-git passwall_packages https://github.com/${{ env.packages }}.git;main
        src-git base https://github.com/openwrt/openwrt.git;openwrt-${{ matrix.sdk_ver }}
        src-git packages https://github.com/openwrt/packages.git;openwrt-${{ matrix.sdk_ver }}
        src-git luci https://github.com/openwrt/luci.git;openwrt-${{ matrix.sdk_ver }}
        src-git routing https://github.com/openwrt/routing.git;openwrt-${{ matrix.sdk_ver }}
        src-git telephony https://github.com/openwrt/telephony.git;openwrt-${{ matrix.sdk_ver }}
        EOF
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        echo "CONFIG_ALL_NONSHARED=n" > .config
        make defconfig

    - name: 🎯 强制精准编译缺失的依赖包
      run: |
        cd sdk
        echo "正在为您编译 chinadns-ng, dns2socks, tcping..."
        make package/feeds/passwall_packages/chinadns-ng/compile -j$(nproc) V=s || true
        make package/feeds/passwall_packages/dns2socks/compile -j$(nproc) V=s || true
        make package/feeds/passwall_packages/tcping/compile -j$(nproc) V=s || true

    - name: 📦 打包并上传战利品
      uses: actions/upload-artifact@v4
      with:
        name: R2C-Passwall-Dependencies
        path: sdk/bin/packages/
